# /etc/nginx/sites-available/spotcredit.org
# Symlink: ln -s /etc/nginx/sites-available/spotcredit.org /etc/nginx/sites-enabled/

# Rate limiting: 60 req/min per IP, burst of 20
limit_req_zone  $binary_remote_addr  zone=main:10m  rate=60r/m;
limit_conn_zone $binary_remote_addr  zone=conn:10m;

# ── HTTP → HTTPS ───────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name spotcredit.org www.spotcredit.org;
    return 301 https://spotcredit.org$request_uri;
}

# ── www → canonical (HTTPS) ───────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.spotcredit.org;

    ssl_certificate     /etc/letsencrypt/live/spotcredit.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spotcredit.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://spotcredit.org$request_uri;
}

# ── Main ───────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name spotcredit.org;

    ssl_certificate     /etc/letsencrypt/live/spotcredit.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spotcredit.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/spotcredit;
    index index.html;

    server_tokens off;

    # ── Rate / connection limits ──────────────────────────────────────────────
    limit_req  zone=main burst=20 nodelay;
    limit_conn conn 10;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size   1k;
    client_body_timeout    10s;
    client_header_timeout  10s;
    keepalive_timeout      30s;
    send_timeout           10s;

    # ── Block everything except GET / HEAD ───────────────────────────────────
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"                                         always;
    add_header X-Content-Type-Options     "nosniff"                                      always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()"     always;
    # CSP: external deps are Chart.js (cdnjs) + Google Fonts only; no backend calls
    add_header Content-Security-Policy    "default-src 'none'; script-src 'self' https://cdnjs.cloudflare.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none'; frame-ancestors 'none';" always;
    add_header Cache-Control              "no-cache"                                     always;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip      on;
    gzip_vary on;
    gzip_types text/html;

    # ── Routing ───────────────────────────────────────────────────────────────
    location / {
        try_files $uri /index.html;
    }

    # Block dotfiles and sensitive extensions
    location ~ /\. {
        deny all;
    }
    location ~* \.(git|env|htaccess|htpasswd|bak|sql|log)$ {
        deny all;
    }

    access_log /var/log/nginx/spotcredit.access.log;
    error_log  /var/log/nginx/spotcredit.error.log warn;
}
